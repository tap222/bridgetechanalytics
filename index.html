    </div>
  );
}


// ── TOKEN MANAGEMENT (Admin) ────────────────────────────────
function TokenManagement(){
  const [vendors,setVendors]=useState(()=>(window.__PORTAL_REQUESTS||[]).filter(r=>r.bridgeStatus==="bridged"));
  const [rotating,setRotating]=useState({});
  const [revoking,setRevoking]=useState({});
  const [search,setSearch]=useState("");
  const [tick,setTick]=useState(0);

  useEffect(()=>{
    const t=setInterval(()=>{
      setVendors([...(window.__PORTAL_REQUESTS||[]).filter(r=>r.bridgeStatus==="bridged")]);
      setTick(v=>v+1);
    },2000);
    return()=>clearInterval(t);
  },[]);

  async function rotateToken(req){
    setRotating(r=>({...r,[req.id]:true}));
    await new Promise(r=>setTimeout(r,1800));
    const newKey="btk-"+Math.random().toString(36).slice(2,18);
    const idx=(window.__PORTAL_REQUESTS||[]).findIndex(r=>r.id===req.id);
    if(idx>=0){
      window.__PORTAL_REQUESTS[idx]={...window.__PORTAL_REQUESTS[idx],
        apiKey:newKey,
        lastRotated:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}),
        rotationCount:(window.__PORTAL_REQUESTS[idx].rotationCount||0)+1};
      window.__BT_BRIDGE_VERSION=(window.__BT_BRIDGE_VERSION||0)+1;
    }
    setVendors([...(window.__PORTAL_REQUESTS||[]).filter(r=>r.bridgeStatus==="bridged")]);
    setRotating(r=>({...r,[req.id]:false}));
  }

  async function revokeToken(req){
    if(!window.confirm("Revoke token for "+req.name+"? They will lose API access immediately.")) return;
    setRevoking(r=>({...r,[req.id]:true}));
    await new Promise(r=>setTimeout(r,1200));
    const idx=(window.__PORTAL_REQUESTS||[]).findIndex(r=>r.id===req.id);
    if(idx>=0){
      window.__PORTAL_REQUESTS[idx]={...window.__PORTAL_REQUESTS[idx],
        apiKey:null,bridgeStatus:"revoked",status:"revoked",
        revokedAt:new Date().toLocaleTimeString()};
      window.__BT_BRIDGE_VERSION=(window.__BT_BRIDGE_VERSION||0)+1;
    }
    setVendors([...(window.__PORTAL_REQUESTS||[]).filter(r=>r.bridgeStatus==="bridged")]);
    setRevoking(r=>({...r,[req.id]:false}));
  }

  const filtered=vendors.filter(v=>!search||v.name.toLowerCase().includes(search.toLowerCase())||v.customerId?.includes(search));
  const totalActive=vendors.length;
  const expiringSoon=vendors.filter(v=>(v.rotationCount||0)===0).length;

  return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>🔐 Token Management</h2>
          <p style={{fontSize:12.5,color:C.muted}}>Manage API keys for all bridged vendors · Rotate · Revoke · Monitor</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search vendor or customer ID..."
            style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 12px",fontSize:12.5,
              outline:"none",background:C.surface,color:C.text,width:240}}/>
        </div>
      </div>

      {/* Summary KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
        {[
          {l:"Active tokens",v:totalActive,c:C.success,icon:"🔑"},
          {l:"Never rotated",v:expiringSoon,c:C.warn,icon:"⏰"},
          {l:"Rotation policy",v:"90 days",c:C.primary,icon:"🔄"},
          {l:"Last action",v:vendors.length>0?"Today":"—",c:C.muted,icon:"📋"},
        ].map((s,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,
            padding:"12px 16px",borderTop:`3px solid ${s.c}`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:10.5,color:C.muted,fontWeight:600,textTransform:"uppercase"}}>{s.l}</span>
              <span style={{fontSize:14}}>{s.icon}</span>
            </div>
            <div style={{fontSize:20,fontWeight:800,color:s.c,fontFamily:"IBM Plex Mono"}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Vendor token table */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:700,color:C.navy}}>Active vendor tokens</span>
          <span style={{fontSize:11.5,color:C.muted}}>{filtered.length} vendors</span>
        </div>
        {filtered.length===0?(
          <div style={{padding:40,textAlign:"center",color:C.muted}}>
            <div style={{fontSize:32,marginBottom:10}}>🔑</div>
            <div style={{fontSize:13,fontWeight:600,color:C.navy,marginBottom:4}}>No bridged vendors yet</div>
            <div style={{fontSize:12}}>Bridge a vendor in AI Schema Bridge to manage their token here</div>
          </div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:C.bg}}>
                {["Vendor","Type","Customer ID","Auth","API Key","Bridged","Rotations","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 14px",textAlign:"left",fontSize:10.5,color:C.muted,fontWeight:600}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((v,i)=>{
                const typeColor={"B2B Buyer":C.accent,"Dealer":C.success,"B2P Portal":"#D85A30"};
                return(
                  <tr key={i} style={{borderTop:`1px solid ${C.border}`}}>
                    <td style={{padding:"12px 14px"}}>
                      <div style={{fontSize:13,fontWeight:600,color:C.navy}}>{v.name}</div>
                      <div style={{fontSize:10.5,color:C.muted}}>{v.bridgedAt||v.submittedAt}</div>
                    </td>
                    <td style={{padding:"12px 14px"}}>
                      <span style={{padding:"2px 8px",borderRadius:9,
                        background:`${typeColor[v.type]||C.muted}15`,color:typeColor[v.type]||C.muted,
                        fontSize:10.5,fontWeight:600}}>{v.type}</span>
                    </td>
                    <td style={{padding:"12px 14px",fontFamily:"IBM Plex Mono",fontSize:11.5,color:C.primary}}>
                      {v.customerId||"—"}
                    </td>
                    <td style={{padding:"12px 14px",fontSize:11.5,color:C.muted}}>{v.auth}</td>
                    <td style={{padding:"12px 14px"}}>
                      {v.apiKey?(
                        <code style={{fontSize:10.5,fontFamily:"IBM Plex Mono",color:C.success,
                          background:`${C.success}10`,padding:"2px 7px",borderRadius:5}}>
                          {v.apiKey.slice(0,12)}••••••
                        </code>
                      ):(
                        <span style={{fontSize:11,color:C.danger}}>Revoked</span>
                      )}
                    </td>
                    <td style={{padding:"12px 14px",fontSize:11,color:C.muted}}>
                      {v.lastRotated||"Never rotated"}
                    </td>
                    <td style={{padding:"12px 14px",fontFamily:"IBM Plex Mono",fontSize:11.5,
                      color:(v.rotationCount||0)>0?C.success:C.warn,fontWeight:600}}>
                      {v.rotationCount||0}×
                    </td>
                    <td style={{padding:"12px 14px"}}>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>rotateToken(v)} disabled={rotating[v.id]}
                          style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.primary}40`,
                            background:`${C.primary}10`,color:C.primary,fontSize:11.5,fontWeight:600,
                            cursor:rotating[v.id]?"wait":"pointer"}}>
                          {rotating[v.id]?"Rotating...":"🔄 Rotate"}
                        </button>
                        <button onClick={()=>revokeToken(v)} disabled={revoking[v.id]||!v.apiKey}
                          style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.danger}40`,
                            background:`${C.danger}10`,color:C.danger,fontSize:11.5,fontWeight:600,
                            cursor:revoking[v.id]||!v.apiKey?"default":"pointer",
                            opacity:!v.apiKey?0.4:1}}>
                          {revoking[v.id]?"Revoking...":"✕ Revoke"}
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {/* Security policy note */}
      <div style={{marginTop:14,padding:"14px 18px",background:C.surface,border:`1px solid ${C.border}`,
        borderRadius:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <div style={{fontSize:12.5,fontWeight:700,color:C.navy,marginBottom:8}}>Token rotation policy</div>
          {["Rotate every 90 days minimum — use the Rotate button above",
            "Rotating issues a new key — old key valid for 24h during transition",
            "Vendor sees their new key automatically in their API Service Setup"].map((s,i)=>(
            <div key={i} style={{fontSize:11.5,color:C.muted,marginBottom:4}}>· {s}</div>
          ))}
        </div>
        <div>
          <div style={{fontSize:12.5,fontWeight:700,color:C.navy,marginBottom:8}}>Revocation</div>
          {["Revoke immediately removes API access — no grace period",
            "Use for offboarding, security incidents, or contract end",
            "Vendor sees 'Token revoked' in their setup page immediately"].map((s,i)=>(
            <div key={i} style={{fontSize:11.5,color:C.muted,marginBottom:4}}>· {s}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── TOKEN UPDATE (Channel — B2B/B2P/Dealer) ─────────────────
function TokenUpdate({customerId}){
  const [myReq,setMyReq]=useState(()=>(window.__PORTAL_REQUESTS||[]).find(r=>r.customerId===customerId));
  const [copied,setCopied]=useState(false);
  const [tick,setTick]=useState(0);

  useEffect(()=>{
    const t=setInterval(()=>{
      const fresh=(window.__PORTAL_REQUESTS||[]).find(r=>r.customerId===customerId);
      setMyReq(fresh?{...fresh}:null);
      setTick(v=>v+1);
    },2000);
    return()=>clearInterval(t);
  },[customerId]);

  function copyKey(){
    if(!myReq?.apiKey) return;
    navigator.clipboard?.writeText(myReq.apiKey).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2500);
  }

  if(!myReq||myReq.bridgeStatus!=="bridged") return(
    <div style={{padding:"22px 26px",flex:1,background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:C.muted}}>
        <div style={{fontSize:36,marginBottom:12}}>🔑</div>
        <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:6}}>No active API key yet</div>
        <div style={{fontSize:12.5}}>Complete the API Service Setup first — your token will appear here once the admin bridges your schema</div>
      </div>
    </div>
  );

  const isRevoked=myReq.bridgeStatus==="revoked"||!myReq.apiKey;

  return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{marginBottom:18}}>
        <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>🔑 My API Token</h2>
        <p style={{fontSize:12.5,color:C.muted}}>View and manage your Universal API access token · Last rotated: {myReq.lastRotated||"Not yet rotated"}</p>
      </div>

      {isRevoked?(
        <div style={{background:C.surface,border:`2px solid ${C.danger}40`,borderRadius:14,padding:"28px 32px",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>🚫</div>
          <div style={{fontSize:17,fontWeight:800,color:C.danger,marginBottom:8}}>Your API token has been revoked</div>
          <div style={{fontSize:13,color:C.muted}}>Contact your BridgeTech admin to restore access. Request ID: {myReq.id}</div>
        </div>
      ):(
        <>
          {/* Token display */}
          <div style={{background:C.surface,border:`2px solid ${C.success}40`,borderRadius:14,padding:"24px 28px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
              <div style={{width:44,height:44,borderRadius:12,background:`${C.success}18`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>✅</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:C.success}}>Token Active</div>
                <div style={{fontSize:12,color:C.muted}}>Bridged {myReq.bridgedAt||myReq.submittedAt} · {myReq.auth}</div>
              </div>
              <div style={{marginLeft:"auto",fontSize:11.5,color:C.muted}}>
                Rotation count: <strong style={{color:C.navy}}>{myReq.rotationCount||0}×</strong>
              </div>
            </div>

            {/* Token value */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Your API key</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <code style={{flex:1,background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:8,
                  padding:"10px 14px",fontFamily:"IBM Plex Mono",fontSize:12.5,color:C.navy,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {myReq.apiKey}
                </code>
                <button onClick={copyKey}
                  style={{padding:"9px 16px",borderRadius:8,border:`1px solid ${C.primary}40`,
                    background:copied?`${C.success}15`:C.primaryDim,color:copied?C.success:C.primary,
                    fontSize:12.5,fontWeight:600,cursor:"pointer",flexShrink:0,transition:"all .2s"}}>
                  {copied?"✓ Copied":"Copy"}
                </button>
              </div>
            </div>

            {/* How to use */}
            <div style={{fontSize:12.5,fontWeight:700,color:C.navy,marginBottom:10}}>How to use your token</div>
            <div style={{background:"#F8FAFC",borderRadius:9,overflow:"hidden",border:`1px solid ${C.border}`}}>
              <div style={{padding:"6px 12px",background:C.primaryDim,fontSize:11.5,fontWeight:600,color:C.navy}}>
                Add to every request
              </div>
              <pre style={{margin:0,padding:"12px 14px",fontFamily:"IBM Plex Mono",fontSize:11,
                color:"#7A8BA0",lineHeight:1.7,whiteSpace:"pre-wrap"}}>
{`${myReq.authHeader||"Authorization"}: ${myReq.authPrefix?myReq.authPrefix+" ":""}${myReq.apiKey}
X-Customer-ID: ${customerId}
Content-Type: application/json`}
              </pre>
            </div>
          </div>

          {/* Security settings */}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 22px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:14}}>Security settings</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                {l:"Customer ID",v:customerId,mono:true},
                {l:"Auth type",v:myReq.auth,mono:false},
                {l:"Header name",v:myReq.authHeader||"Authorization",mono:true},
                {l:"Token prefix",v:myReq.authPrefix||"None",mono:false},
                {l:"Base URL",v:"https://api.bridgetech-hub.io",mono:true},
                {l:"Rotation policy",v:"Every 90 days",mono:false},
              ].map((f,i)=>(
                <div key={i} style={{padding:"9px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{f.l}</div>
                  <div style={{fontSize:12.5,fontWeight:600,color:C.navy,
                    fontFamily:f.mono?"IBM Plex Mono":undefined}}>{f.v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Security checklist */}
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:12}}>Security checklist</div>
            {[
              {ok:true,t:"Use Authorization header only",d:"Never include your token in URL parameters — visible in server logs"},
              {ok:true,t:"Always send X-Customer-ID",d:"Every request must include your customer ID to filter catalog and route orders"},
              {ok:(myReq.rotationCount||0)>0,t:"Token rotated at least once",d:"Contact your admin to rotate your token if you haven't already"},
              {ok:false,t:"IP allowlisting",d:"Ask your admin to restrict your key to your server IP ranges for extra security"},
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"9px 0",
                borderBottom:i<3?`1px solid ${C.bg}`:"none"}}>
                <span style={{fontSize:16,flexShrink:0}}>{s.ok?"✅":"⚠️"}</span>
                <div>
                  <div style={{fontSize:12.5,fontWeight:600,color:s.ok?C.navy:C.warn}}>{s.t}</div>
                  <div style={{fontSize:11.5,color:C.muted}}>{s.d}</div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── APP SHELL ──────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [apiKey,setApiKey]=useState(()=>sessionStorage.getItem("bt_api_key")||"");
  const [customerId,setCustomerId]=useState("MRR-001");

  useEffect(()=>{
    window.__BT_API_KEY=apiKey;
    if(apiKey)sessionStorage.setItem("bt_api_key",apiKey);
  },[apiKey]);

  function handleLogin(r){
    setRole(r);
    // Set default customer ID by role
    if(r==="B2B Buyer") setCustomerId("MRR-001");
    if(r==="Dealer") setCustomerId("HDT-007");
    setPage("dashboard");
  }

  if(!role) return <Login onLogin={handleLogin}/>;

  function renderPage(){
    switch(page){
      case"dashboard":      return <Dashboard role={role} onNavigate={setPage} customerId={customerId}/>;
      case"catalog":        return <CatalogModule role={role} customerId={customerId}/>;
      case"customers":      return <CustomerRegistry/>;
      case"api-monitor":    return <APIMonitor/>;
      case"order-listener": return <OrderListener/>;
      case"ai-routing":     return <AIRoutingMonitor/>;
      case"oms-registry":   return <OMSRegistry/>;
      case"schema-bridge":  return <SchemaBridge/>;
      case"support":        return <SupportAgent/>;
      case"token-mgmt":     return <TokenManagement/>;
      case"churn":          return <ChurnAgent/>;
      case"intent":         return <IntentMonitor/>;
      case"my-token":       return <TokenUpdate customerId={customerId}/>;
      case"api-setup":      return <APIServiceSetup role={role} customerId={customerId}/>;
      case"track":          return <OrderTracking customerId={customerId}/>;
      case"orders":         return <OrderTracking customerId={customerId}/>;
      case"replenishment":  return <OrderTracking customerId={customerId}/>;
      case"catalog-sync":   return <CatalogModule role={role} customerId={customerId}/>;
      case"marketplace-orders": return <OrderListener/>;
      default:              return <Dashboard role={role} onNavigate={setPage} customerId={customerId}/>;
    }
  }

  const pageName = page.replace(/-/g," ").replace(/\w/g,c=>c.toUpperCase());

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <Sidebar active={page} setActive={setPage} role={role} onLogout={()=>{setRole(null);setPage("dashboard");}}/>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {/* Topbar */}
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 26px",
          display:"flex",alignItems:"center",justifyContent:"space-between",height:54,flexShrink:0,
          boxShadow:"0 1px 0 rgba(0,0,0,0.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <span style={{fontSize:12,color:C.muted}}>BridgeTech</span>
            <span style={{fontSize:12,color:C.border}}>›</span>
            <span style={{fontSize:12,fontWeight:600,color:C.navy}}>{pageName}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,
            border:`1.5px solid ${apiKey?C.success+"60":C.warn+"80"}`,borderRadius:10,
            padding:"5px 12px",background:apiKey?"rgba(34,197,94,0.04)":"rgba(245,158,11,0.04)",
            flex:"0 0 auto",minWidth:380}}>
            <span style={{fontSize:14}}>{apiKey?"🔑":"⚠️"}</span>
            <input value={apiKey} onChange={e=>setApiKey(e.target.value)}
              placeholder="Paste your Access Code to Enable AI Features"
              type="password"
              style={{border:"none",background:"transparent",fontSize:12,color:C.text,
                outline:"none",fontFamily:"var(--font)",flex:1,minWidth:0}}/>
            {apiKey&&<span style={{fontSize:10.5,color:C.success,fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>✓ AI Ready</span>}
            {!apiKey&&<span style={{fontSize:10.5,color:C.warn,fontWeight:500,flexShrink:0}}>Required for AI</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:C.success,display:"inline-block"}}/>
              <span style={{fontSize:11.5,color:C.muted}}>Orchestration Hub</span>
              <span style={{fontSize:11,color:C.success,fontWeight:600}}>Connected</span>
            </div>
            <div style={{width:1,height:18,background:C.border}}/>
            <div style={{display:"flex",alignItems:"center",gap:7,padding:"4px 11px",
              background:C.primaryDim,borderRadius:7,border:`1px solid ${C.primary}20`}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:C.primary,display:"flex",
                alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff"}}>
                {role[0]}
              </div>
              <span style={{fontSize:12,fontWeight:600,color:C.primary}}>{role}</span>
            </div>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto"}}><ErrorBoundary key={page}>{renderPage()}</ErrorBoundary></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
