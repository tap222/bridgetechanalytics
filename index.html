// ── ERROR BOUNDARY ─────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(e){ return {hasError:true,error:e}; }
  componentDidCatch(e,info){ console.error("Page error:",e,info); }
  render(){
    if(this.state.hasError){
      return(
        <div style={{padding:40,textAlign:"center",color:"#4A4A4A"}}>
          <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>This module encountered an error</div>
          <div style={{fontSize:13,color:"#7A8BA0",marginBottom:20}}>{this.state.error?.message||"Unknown error"}</div>
          <button onClick={()=>this.setState({hasError:false,error:null})}
            style={{padding:"9px 22px",borderRadius:9,border:"none",background:"#006784",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            ↺ Retry
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── RICH MESSAGE RENDERER ──────────────────────────────────
function RichMessage({text, isUser}){
  if(isUser) return <span style={{whiteSpace:"pre-wrap"}}>{text}</span>;

  // Parse markdown-like content into React elements
  function parseInline(str){
    // bold **text** and *text*
    const parts=str.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g);
    return parts.map((p,i)=>{
      if(p.startsWith("**")&&p.endsWith("**"))
        return <strong key={i} style={{fontWeight:700,color:C.navy}}>{p.slice(2,-2)}</strong>;
      if(p.startsWith("*")&&p.endsWith("*"))
        return <em key={i} style={{fontStyle:"italic"}}>{p.slice(1,-1)}</em>;
      if(p.startsWith("`")&&p.endsWith("`"))
        return <code key={i} style={{fontFamily:"IBM Plex Mono",fontSize:"0.88em",background:"rgba(0,103,132,0.10)",color:C.primary,padding:"1px 5px",borderRadius:4}}>{p.slice(1,-1)}</code>;
      return p;
    });
  }

  function parseTable(rows){
    // rows is array of pipe-split lines
    const head=rows[0].split("|").map(c=>c.trim()).filter(Boolean);
    // row[1] is separator --- skip it
    const body=rows.slice(2).map(r=>r.split("|").map(c=>c.trim()).filter(Boolean));
    return(
      <div style={{overflowX:"auto",marginTop:10,marginBottom:10,borderRadius:10,border:`1px solid ${C.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:`linear-gradient(135deg,${C.navy},${C.primary})`}}>
              {head.map((h,i)=>(
                <th key={i} style={{padding:"10px 14px",textAlign:"left",color:"#fff",fontWeight:600,fontSize:12,whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {body.map((row,ri)=>(
              <tr key={ri} style={{background:ri%2===0?C.surface:"#f7f9fc",borderTop:`1px solid ${C.border}`}}>
                {row.map((cell,ci)=>(
                  <td key={ci} style={{padding:"9px 14px",color:C.text,fontSize:13,
                    fontWeight:ci===0?600:400,
                    color:ci===0?C.navy:C.text,
                    fontFamily:cell.match(/^\$[\d,.]|^\d+[\d,.]*$/)?"IBM Plex Mono":undefined,
                    color:cell.startsWith("$")||cell.match(/^[\d,.]+$/)? C.primary:ci===0?C.navy:C.text
                  }}>{parseInline(cell)}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  const lines=text.split("\n");
  const elements=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];

    // Blank line
    if(line.trim()===""){i++;continue;}

    // H1 / H2 / H3
    const hm=line.match(/^(#{1,3})\s+(.+)/);
    if(hm){
      const lvl=hm[1].length;
      const sizes=[20,17,15];
      elements.push(
        <div key={i} style={{fontWeight:700,fontSize:sizes[lvl-1]||14,color:C.navy,marginTop:lvl===1?14:10,marginBottom:4,
          borderBottom:lvl===1?`2px solid ${C.accent}`:lvl===2?`1px solid ${C.border}`:"none",paddingBottom:lvl<3?5:0}}>
          {parseInline(hm[2])}
        </div>
      );
      i++;continue;
    }

    // Horizontal rule
    if(line.match(/^[-*_]{3,}$/)){
      elements.push(<hr key={i} style={{border:"none",borderTop:`1px solid ${C.border}`,margin:"10px 0"}}/>);
      i++;continue;
    }

    // Detect table: line starts with | and next line is separator
    if(line.trim().startsWith("|")&&lines[i+1]&&lines[i+1].match(/^\|?[\s\-|:]+\|?$/)){
      const tableRows=[];
      while(i<lines.length&&lines[i].trim().startsWith("|")){
        tableRows.push(lines[i]);i++;
      }
      elements.push(<div key={`t${i}`}>{parseTable(tableRows)}</div>);
      continue;
    }

    // Ordered list
    const olm=line.match(/^(\d+)\.\s+(.*)/);
    if(olm){
      const items=[];
      while(i<lines.length&&lines[i].match(/^\d+\.\s+/)){
        const m2=lines[i].match(/^\d+\.\s+(.*)/);
        items.push(m2[1]);i++;
      }
      elements.push(
        <ol key={`ol${i}`} style={{paddingLeft:22,margin:"8px 0",display:"flex",flexDirection:"column",gap:5}}>
          {items.map((it,j)=>(
            <li key={j} style={{fontSize:13.5,lineHeight:1.65,color:"inherit"}}>
              <span style={{marginLeft:4}}>{parseInline(it)}</span>
            </li>
          ))}
        </ol>
      );
      continue;
    }

    // Unordered list
    const ulm=line.match(/^[-*•]\s+(.*)/);
    if(ulm){
      const items=[];
      while(i<lines.length&&lines[i].match(/^[-*•]\s+/)){
        const m2=lines[i].match(/^[-*•]\s+(.*)/);
        items.push(m2[1]);i++;
      }
      elements.push(
        <ul key={`ul${i}`} style={{paddingLeft:0,margin:"8px 0",display:"flex",flexDirection:"column",gap:5,listStyle:"none"}}>
          {items.map((it,j)=>(
            <li key={j} style={{display:"flex",gap:8,fontSize:13.5,lineHeight:1.65,color:C.text,alignItems:"flex-start"}}>
              <span style={{color:C.accent,fontWeight:700,marginTop:1,flexShrink:0}}>▸</span>
              <span>{parseInline(it)}</span>
            </li>
          ))}
        </ul>
      );
      continue;
    }

    // Blockquote / callout
    const bqm=line.match(/^>\s+(.*)/);
    if(bqm){
      const bqLines=[];
      while(i<lines.length&&lines[i].match(/^>\s?/)){
        bqLines.push(lines[i].replace(/^>\s?/,""));i++;
      }
      elements.push(
        <div key={`bq${i}`} style={{borderLeft:`3px solid ${C.accent}`,paddingLeft:12,margin:"8px 0",
          background:C.accentDim,borderRadius:"0 8px 8px 0",padding:"10px 14px"}}>
          {bqLines.map((l,j)=><div key={j} style={{fontSize:13,color:C.navy,fontStyle:"italic"}}>{parseInline(l)}</div>)}
        </div>
      );
      continue;
    }

    // Code block
    if(line.startsWith("```")){
      const lang=line.slice(3).trim();
      i++;
      const codeLines=[];
      while(i<lines.length&&!lines[i].startsWith("```")){codeLines.push(lines[i]);i++;}
      i++;
      elements.push(
        <div key={`code${i}`} style={{background:C.navy,borderRadius:10,margin:"8px 0",overflow:"hidden"}}>
          {lang&&<div style={{padding:"5px 14px",background:C.navyLight||"#2A3860",fontSize:11,color:C.accent,fontWeight:600,fontFamily:"IBM Plex Mono"}}>{lang}</div>}
          <pre style={{padding:"12px 16px",margin:0,fontSize:12,fontFamily:"IBM Plex Mono",color:"#e2e8f0",overflowX:"auto",lineHeight:1.6}}>{codeLines.join("\n")}</pre>
        </div>
      );
      continue;
    }

    // Step label: "Step 1:" or "1)" pattern at start of line
    const stepM=line.match(/^(Step\s+\d+:|Phase\s+\d+:|\d+\))\s*(.*)/i);
    if(stepM){
      elements.push(
        <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",margin:"8px 0",
          padding:"10px 14px",background:C.primaryDim,borderRadius:10,border:`1px solid ${C.primary}20`}}>
          <span style={{background:C.primary,color:"#fff",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>{stepM[1]}</span>
          <span style={{fontSize:13.5,lineHeight:1.6,color:C.navy}}>{parseInline(stepM[2])}</span>
        </div>
      );
      i++;continue;
    }

    // Normal paragraph
    const paraLines=[];
    while(i<lines.length&&lines[i].trim()!==""&&!lines[i].match(/^[#>*\-\d`|]/)&&!lines[i].match(/^Step\s+\d+:/i)){
      paraLines.push(lines[i]);i++;
    }
    if(paraLines.length>0){
      elements.push(
        <p key={`p${i}`} style={{fontSize:13.5,lineHeight:1.7,color:"inherit",margin:"4px 0"}}>
          {parseInline(paraLines.join(" "))}
        </p>
      );
    } else {i++;}
  }

  return <div style={{display:"flex",flexDirection:"column",gap:3,color:"inherit"}}>{elements}</div>;
}

// ── CLAUDE API ─────────────────────────────────────────────
async function callClaude(msgs, system=null, maxTok=900){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),30000);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      signal:controller.signal,
      headers:{
        "Content-Type":"application/json",
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
        ...(window.__BT_API_KEY?{"x-api-key":window.__BT_API_KEY}:{})
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:maxTok,
        ...(system?{system}:{}),
        messages:msgs
      })
    });
    clearTimeout(timer);
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      return "⚠️ API Error "+res.status+": "+(err?.error?.message||res.statusText);
    }
    const d=await res.json();
    if(d.error)return"⚠️ "+d.error.type+": "+d.error.message;
    return d.content?.[0]?.text||"No response received.";
  }catch(e){
    clearTimeout(timer);
    if(e.name==="AbortError")return"⚠️ Request timed out (30s). Check your network and try again.";
    return"⚠️ Network error: "+e.message;
  }
}

// ── SPARKLINE HELPER ──────────────────────────────────────
function MiniSparkline({data,color}){
  const max=Math.max(...data);
  const w=80,h=32,bars=data.length,bw=w/bars-2;
  return(
    <svg width={w} height={h} style={{display:"block"}}>
      {data.map((v,i)=>{
        const barH=Math.round((v/max)*(h-4));
        return <rect key={i} x={i*(bw+2)} y={h-barH} width={bw} height={barH}
          rx={2} fill={color} opacity={i===data.length-1?1:0.35}/>;
      })}
    </svg>
  );
}
function WeeklyChart({data,color}){
  const max=Math.max(...data);
  const days=["M","T","W","T","F","S","S"];
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>
      {data.map((v,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",background:i===data.length-1?color:color+"55",borderRadius:"3px 3px 0 0",
            height:Math.round((v/max)*52),transition:"height .3s",minHeight:3}}/>
          <span style={{fontSize:9,color:C.muted,fontWeight:500}}>{days[i]}</span>
        </div>
      ))}
    </div>
  );
}

// Customer catalog filter: returns SKUs allowed for a given customer
function getCustomerCatalog(customerId, customers=INIT_CUSTOMERS){
  const cust = customers.find(c=>c.id===customerId);
  if(!cust) return MASTER_CATALOG;
  return MASTER_CATALOG.filter(p=>
    cust.allowedGroups.includes(p.group)||cust.allowedSkus.includes(p.sku)
  );
}

// ── GEN AI CATALOG ─────────────────────────────────────────
function CatalogModule({role,customerId}){
  const [search,setSearch]=useState("");
  const [selGroup,setSelGroup]=useState("All");
  const [cart,setCart]=useState([]);
  const [aiQuery,setAiQuery]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResult,setAiResult]=useState("");
  const [viewMode,setViewMode]=useState("grid");

  const isAdmin=role==="Admin";
  const myCatalog=isAdmin?MASTER_CATALOG:getCustomerCatalog(customerId);

  const groups=["All",...Object.keys(PRODUCT_GROUPS)];
  const filtered=myCatalog.filter(p=>{
    const matchG=selGroup==="All"||p.group===selGroup;
    const matchS=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.sku.toLowerCase().includes(search.toLowerCase());
    return matchG&&matchS;
  });

  async function askAI(){
    if(!aiQuery.trim()||aiLoading)return;
    setAiLoading(true);
    const sys=`You are a parts catalog assistant for BridgeTech Manufacturing. 
Available parts: ${JSON.stringify(myCatalog.map(p=>({sku:p.sku,name:p.name,group:p.group,price:p.price,stock:p.stock})))}
Help the user find the right parts. Use markdown tables for comparisons. Keep responses concise.`;
    const res=await callClaude([{role:"user",content:aiQuery}],sys,600);
    setAiResult(res);setAiLoading(false);
  }

  function addCart(p){
    setCart(c=>{const ex=c.find(x=>x.sku===p.sku);
      if(ex)return c.map(x=>x.sku===p.sku?{...x,qty:x.qty+1}:x);
      return [...c,{...p,qty:1}];
    });
  }

  const total=cart.reduce((s,i)=>s+(i.qty>=i.bqty?i.bulk:i.price)*i.qty,0);

  return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>
            {isAdmin?"Gen AI Product Catalog":"My Parts Catalog"}
          </h2>
          <p style={{fontSize:12.5,color:C.muted}}>
            {isAdmin?"Master catalog · AI product group classification · Customer filtering"
              :`${myCatalog.length} SKUs across ${[...new Set(myCatalog.map(p=>p.group))].length} product groups`}
          </p>
        </div>
        {!isAdmin&&cart.length>0&&(
          <div style={{background:C.primary,color:"#fff",borderRadius:10,padding:"8px 16px",fontSize:12.5,fontWeight:600}}>
            🛒 {cart.length} items · ${total.toFixed(2)}
          </div>
        )}
      </div>

      {/* Product group tiles */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:16}}>
        {Object.entries(PRODUCT_GROUPS).map(([g,info])=>{
          const cnt=myCatalog.filter(p=>p.group===g).length;
          const isAvail=cnt>0;
          const isSel=selGroup===g;
          return(
            <div key={g} onClick={()=>isAvail&&setSelGroup(isSel?"All":g)}
              style={{padding:"12px 10px",borderRadius:10,border:`2px solid ${isSel?info.color:isAvail?info.color+"30":"#eee"}`,
                background:isSel?`${info.color}12`:isAvail?`${info.color}06`:"#fafafa",
                cursor:isAvail?"pointer":"default",textAlign:"center",opacity:isAvail?1:0.4,transition:"all .14s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{info.icon}</div>
              <div style={{fontSize:11.5,fontWeight:700,color:isSel?info.color:C.navy}}>{g}</div>
              <div style={{fontSize:10,color:info.color,fontWeight:600}}>{cnt} SKU{cnt!==1?"s":""}</div>
            </div>
          );
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:16}}>
        <div>
          {/* Search + filter bar */}
          <div style={{display:"flex",gap:10,marginBottom:14,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 14px",alignItems:"center"}}>
            <span style={{color:C.muted}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search by name or SKU..."
              style={{flex:1,border:"none",outline:"none",fontSize:13,background:"transparent",color:C.text}}/>
            <span style={{fontSize:11.5,color:C.muted}}>{filtered.length} parts</span>
          </div>

          {/* Parts grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
            {filtered.map(p=>{
              const grp=PRODUCT_GROUPS[p.group];
              const inCart=cart.find(c=>c.sku===p.sku);
              return(
                <div key={p.sku} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",
                  transition:"all .14s"}}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow=""}>
                  <div style={{height:4,background:grp.color}}/>
                  <div style={{padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                      <span style={{padding:"2px 7px",borderRadius:8,background:`${grp.color}14`,color:grp.color,fontSize:10,fontWeight:600}}>{p.group}</span>
                      <span style={{fontSize:10,color:C.muted,fontFamily:"IBM Plex Mono"}}>{p.sku}</span>
                    </div>
                    <div style={{fontSize:13.5,fontWeight:700,color:C.navy,marginBottom:4,lineHeight:1.3}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{p.desc}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div>
                        <div style={{fontSize:16,fontWeight:800,color:C.primary,fontFamily:"IBM Plex Mono"}}>${p.price.toFixed(2)}</div>
                        <div style={{fontSize:10,color:C.success}}>Bulk: ${p.bulk.toFixed(2)} ({p.bqty}+)</div>
                      </div>
                      <div style={{fontSize:10,color:p.stock<100?C.warn:C.success,fontWeight:600}}>{p.stock} in stock</div>
                    </div>
                    {!isAdmin&&(
                      <button onClick={()=>addCart(p)}
                        style={{width:"100%",padding:"7px",borderRadius:7,border:"none",
                          background:inCart?C.success:C.primary,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                        {inCart?`✓ In cart (${inCart.qty})`:"Add to order"}
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* AI sidebar */}
        <div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:14}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,background:C.primaryDim}}>
              <div style={{fontSize:13,fontWeight:700,color:C.navy}}>🤖 AI Parts Advisor</div>
              <div style={{fontSize:10.5,color:C.muted}}>Ask about parts, compatibility, pricing</div>
            </div>
            <div style={{padding:"12px 14px"}}>
              <textarea value={aiQuery} onChange={e=>setAiQuery(e.target.value)}
                placeholder="e.g. What heating elements work for Whirlpool dryers?"
                rows={3}
                style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",
                  fontSize:12.5,resize:"none",outline:"none",background:C.bg,color:C.text,marginBottom:8}}/>
              <button onClick={askAI} disabled={aiLoading||!aiQuery.trim()}
                style={{width:"100%",padding:"8px",borderRadius:8,border:"none",
                  background:aiLoading||!aiQuery.trim()?C.muted:C.primary,color:"#fff",
                  fontSize:12.5,fontWeight:600,cursor:aiLoading?"wait":!aiQuery.trim()?"default":"pointer"}}>
                {aiLoading?"Thinking...":"Ask AI Advisor"}
              </button>
            </div>
            {aiResult&&(
              <div style={{padding:"0 14px 14px"}}>
                <div style={{padding:"10px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
                  <RichMessage text={aiResult} isUser={false}/>
                </div>
              </div>
            )}
          </div>

          {/* Cart */}
          {!isAdmin&&cart.length>0&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
              <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>Order Cart</div>
              {cart.map(item=>(
                <div key={item.sku} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"7px 0",borderBottom:`1px solid ${C.bg}`}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                    <div style={{fontSize:10.5,color:C.muted}}>Qty: {item.qty} × ${(item.qty>=item.bqty?item.bulk:item.price).toFixed(2)}</div>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:C.primary,marginLeft:8}}>${((item.qty>=item.bqty?item.bulk:item.price)*item.qty).toFixed(2)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 6px",fontWeight:700}}>
                <span style={{color:C.navy}}>Total</span>
                <span style={{color:C.primary,fontSize:15}}>${total.toFixed(2)}</span>
              </div>
              <button style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:C.primary,color:"#fff",fontSize:12.5,fontWeight:700,cursor:"pointer"}}>
                Submit Order →
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── CUSTOMER REGISTRY (Admin) ───────────────────────────────
function CustomerRegistry(){
  const [customers,setCustomers]=useState([...INIT_CUSTOMERS]);
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newSku,setNewSku]=useState("");
  const typeColor={"B2B Buyer":C.accent,"Dealer":C.success};

  function toggleGroup(custId,group){
    setCustomers(cs=>cs.map(c=>{
      if(c.id!==custId)return c;
      const has=c.allowedGroups.includes(group);
      return {...c,allowedGroups:has?c.allowedGroups.filter(g=>g!==group):[...c.allowedGroups,group]};
    }));
    if(sel?.id===custId)setSel(c=>({...c,allowedGroups:c.allowedGroups.includes(group)?c.allowedGroups.filter(g=>g!==group):[...c.allowedGroups,group]}));
  }

  function addSkuToCustomer(custId){
    if(!newSku.trim())return;
    const sku=newSku.trim().toUpperCase();
    if(!MASTER_CATALOG.find(p=>p.sku===sku)){alert("SKU not found in master catalog");return;}
    setCustomers(cs=>cs.map(c=>c.id===custId?{...c,allowedSkus:[...new Set([...c.allowedSkus,sku])]}:c));
    if(sel?.id===custId)setSel(c=>({...c,allowedSkus:[...new Set([...c.allowedSkus,sku])]}));
    setNewSku("");
  }

  return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>Customer Registry</h2>
          <p style={{fontSize:12.5,color:C.muted}}>Manage customer IDs · Assign product groups · Add SKUs to customer catalog</p>
        </div>
        <button onClick={()=>setShowAdd(true)}
          style={{padding:"8px 18px",borderRadius:9,border:"none",background:C.primary,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          + Add Customer
        </button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:16}}>
        {/* Customer list */}
        <div>
          {customers.map(c=>{
            const myCat=getCustomerCatalog(c.id,customers);
            const isSel=sel?.id===c.id;
            return(
              <div key={c.id} onClick={()=>setSel(isSel?null:c)}
                style={{background:C.surface,border:`2px solid ${isSel?(typeColor[c.type]||C.primary):C.border}`,
                  borderRadius:12,padding:"14px 16px",marginBottom:10,cursor:"pointer",transition:"all .14s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:13.5,fontWeight:700,color:isSel?(typeColor[c.type]||C.primary):C.navy}}>{c.name}</div>
                    <div style={{fontSize:10.5,fontFamily:"IBM Plex Mono",color:C.muted}}>{c.id}</div>
                  </div>
                  <span style={{padding:"2px 8px",borderRadius:10,background:`${typeColor[c.type]||C.primary}15`,
                    color:typeColor[c.type]||C.primary,fontSize:10.5,fontWeight:600}}>{c.type}</span>
                </div>
                <div style={{fontSize:11,color:C.muted}}>
                  {c.allowedGroups.length} groups · {myCat.length} SKUs · ${(c.spend/1000).toFixed(0)}K spend
                </div>
              </div>
            );
          })}
        </div>

        {/* Customer detail editor */}
        <div>
          {!sel?(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:40,textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🏢</div>
              <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:6}}>Select a customer</div>
              <div style={{fontSize:13,color:C.muted}}>Click a customer to manage their product group access and catalog SKUs</div>
            </div>
          ):(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
              <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,background:C.primaryDim}}>
                <div style={{fontSize:15,fontWeight:700,color:C.navy}}>{sel.name}</div>
                <div style={{fontSize:11.5,color:C.muted}}>{sel.id} · {sel.type} · {sel.contact}</div>
              </div>
              <div style={{padding:"18px 20px"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:12}}>Allowed product groups</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginBottom:20}}>
                  {Object.entries(PRODUCT_GROUPS).map(([g,info])=>{
                    const has=sel.allowedGroups.includes(g);
                    return(
                      <div key={g} onClick={()=>toggleGroup(sel.id,g)}
                        style={{padding:"10px 12px",borderRadius:9,border:`2px solid ${has?info.color:C.border}`,
                          background:has?`${info.color}10`:C.surface,cursor:"pointer",transition:"all .12s"}}>
                        <div style={{fontSize:18,marginBottom:3}}>{info.icon}</div>
                        <div style={{fontSize:12,fontWeight:700,color:has?info.color:C.navy}}>{g}</div>
                        <div style={{fontSize:10,color:has?info.color:C.muted}}>{has?"✓ Enabled":"Click to enable"}</div>
                      </div>
                    );
                  })}
                </div>

                <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>Add specific SKUs to catalog</div>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <input value={newSku} onChange={e=>setNewSku(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addSkuToCustomer(sel.id)}
                    placeholder="Enter SKU (e.g. APM-HTR-001)"
                    style={{flex:1,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12.5,fontFamily:"IBM Plex Mono",outline:"none"}}/>
                  <button onClick={()=>addSkuToCustomer(sel.id)}
                    style={{padding:"8px 16px",borderRadius:8,border:"none",background:C.primary,color:"#fff",fontSize:12.5,fontWeight:600,cursor:"pointer"}}>
                    Add SKU
                  </button>
                </div>
                {sel.allowedSkus.length>0&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {sel.allowedSkus.map(sku=>(
                      <span key={sku} style={{padding:"3px 9px",borderRadius:10,background:C.primaryDim,
                        color:C.primary,fontSize:11,fontWeight:600,fontFamily:"IBM Plex Mono"}}>{sku}</span>
                    ))}
                  </div>
                )}

                <div style={{marginTop:20,padding:"12px 14px",background:C.bg,borderRadius:9}}>
                  <div style={{fontSize:11.5,fontWeight:600,color:C.navy,marginBottom:6}}>Effective catalog for this customer</div>
                  <div style={{fontSize:11,color:C.muted}}>
                    {getCustomerCatalog(sel.id,customers).map(p=>p.sku).join(" · ")||"No SKUs assigned"}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── UNIVERSAL API MONITOR (Admin) ──────────────────────────
function APIMonitor(){
  const METHODS=["POST","GET","PUT"];
  const PATHS=["/api/catalog","/api/order","/api/track","/api/incoming","/api/webhook"];
  const CHANS=["B2B Buyer","Dealer","B2P Portal","Marketplace"];
  const STATS=[200,200,200,201,422,500];
  const [reqs,setReqs]=useState(()=>Array.from({length:15},()=>({
    id:`REQ-${Math.floor(Math.random()*9000)+1000}`,
    method:["POST","GET","GET"][Math.floor(Math.random()*3)],
    path:PATHS[Math.floor(Math.random()*PATHS.length)],
    channel:CHANS[Math.floor(Math.random()*CHANS.length)],
    status:STATS[Math.floor(Math.random()*STATS.length)],
    lat:Math.floor(80+Math.random()*400),
    ts:new Date().toLocaleTimeString(),
    routed:OMS_SYSTEMS[Math.floor(Math.random()*3)].name,
  })));
  const [paused,setPaused]=useState(false);
  const [sel,setSel]=useState(null);
  useEffect(()=>{
    if(paused)return;
    const t=setInterval(()=>{
      setReqs(r=>[{
        id:`REQ-${Math.floor(Math.random()*9000)+1000}`,
        method:["POST","GET","GET"][Math.floor(Math.random()*3)],
        path:PATHS[Math.floor(Math.random()*PATHS.length)],
        channel:CHANS[Math.floor(Math.random()*CHANS.length)],
        status:STATS[Math.floor(Math.random()*STATS.length)],
        lat:Math.floor(80+Math.random()*400),
        ts:new Date().toLocaleTimeString(),
        routed:OMS_SYSTEMS[Math.floor(Math.random()*3)].name,
      },...r.slice(0,99)]);
    },2400);
    return()=>clearInterval(t);
  },[paused]);
  const sc=s=>s<300?"#22C55E":s<500?"#F59E0B":"#EF4444";
  const errCount=reqs.filter(r=>r.status>=400).length;
  const avgLat=Math.round(reqs.reduce((s,r)=>s+r.lat,0)/reqs.length);
  return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>Universal API Monitor</h2>
          <p style={{fontSize:12.5,color:C.muted}}>Live traffic · /catalog · /order · /track · All channels</p>
        </div>
        <button onClick={()=>setPaused(p=>!p)}
          style={{padding:"7px 16px",borderRadius:8,border:`1px solid ${C.border}`,
            background:paused?"#22C55E20":C.surface,color:paused?"#22C55E":C.muted,fontSize:12.5,fontWeight:600,cursor:"pointer"}}>
          {paused?"▶ Resume":"⏸ Pause"}
        </button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        {[
          {l:"Total",v:reqs.length,c:C.primary},
          {l:"Errors",v:errCount,c:errCount>5?C.danger:C.warn},
          {l:"Avg Latency",v:avgLat+"ms",c:avgLat>300?C.warn:C.success},
          {l:"Success Rate",v:((1-errCount/reqs.length)*100).toFixed(1)+"%",c:C.success},
        ].map((s,i)=>(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:s.c,fontFamily:"IBM Plex Mono"}}>{s.v}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:14}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:C.bg}}>
                {["Method + Path","Channel","Status","Latency","Routed To","Time"].map(h=>(
                  <th key={h} style={{padding:"9px 12px",textAlign:"left",fontSize:10.5,color:C.muted,fontWeight:600}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {reqs.slice(0,20).map((r,i)=>(
                <tr key={i} onClick={()=>setSel(r)}
                  style={{borderTop:`1px solid ${C.border}`,cursor:"pointer",
                    background:sel?.id===r.id?C.primaryDim:"transparent",transition:"background .1s"}}
                  onMouseEnter={e=>!sel&&(e.currentTarget.style.background=C.bg)}
                  onMouseLeave={e=>!sel&&(e.currentTarget.style.background="")}>
                  <td style={{padding:"8px 12px"}}>
                    <span style={{padding:"2px 6px",borderRadius:5,background:r.method==="GET"?C.blueDim:C.accentDim,
                      color:r.method==="GET"?C.blue:C.accent,fontSize:10.5,fontWeight:700,marginRight:6}}>{r.method}</span>
                    <code style={{fontSize:11,fontFamily:"IBM Plex Mono",color:C.muted}}>{r.path}</code>
                  </td>
                  <td style={{padding:"8px 12px",fontSize:12,color:C.text}}>{r.channel}</td>
                  <td style={{padding:"8px 12px",fontFamily:"IBM Plex Mono",fontWeight:700,color:sc(r.status),fontSize:12}}>{r.status}</td>
                  <td style={{padding:"8px 12px",fontFamily:"IBM Plex Mono",fontSize:12,color:r.lat>300?C.warn:C.text}}>{r.lat}ms</td>
                  <td style={{padding:"8px 12px",fontSize:11,color:C.muted}}>{r.routed}</td>
                  <td style={{padding:"8px 12px",fontSize:11,fontFamily:"IBM Plex Mono",color:C.muted}}>{r.ts}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
          {sel?(
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:12}}>Request Detail</div>
              {[["Method",sel.method],["Path",sel.path],["Channel",sel.channel],["Status",sel.status],["Latency",sel.lat+"ms"],["Routed To",sel.routed],["Time",sel.ts]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.bg}`}}>
                  <span style={{fontSize:11,color:C.muted}}>{k}</span>
                  <span style={{fontSize:11.5,fontWeight:600,color:C.navy,fontFamily:"IBM Plex Mono"}}>{v}</span>
                </div>
              ))}
            </div>
          ):(
            <div style={{textAlign:"center",padding:"30px 0",color:C.muted}}>
              <div style={{fontSize:28,marginBottom:8}}>👆</div>
              <div style={{fontSize:12.5}}>Click a request to see details</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    </div>

}

// ── API SERVICE SETUP (B2B Buyer / Dealer / B2P) ────────────
function APIServiceSetup({role,customerId}){
  const cust=INIT_CUSTOMERS.find(c=>c.id===customerId)||INIT_CUSTOMERS[0];
  const myCatalog=getCustomerCatalog(customerId);
  const [schema,setSchema]=useState("");
  const [detectedAuth,setDetectedAuth]=useState(null);
  const isDealer=role==="Dealer";

  // Check if this customer already has a portal request
  const existingReq=()=>(window.__PORTAL_REQUESTS||[]).find(r=>r.customerId===customerId);
  const [myRequest,setMyRequest]=useState(existingReq);
  // Poll for status change (admin may bridge while vendor is watching)
  const [_tick,setTick]=useState(0);
  useEffect(()=>{
    let lastVer=window.__BT_BRIDGE_VERSION||0;
    const t=setInterval(()=>{
      const curVer=window.__BT_BRIDGE_VERSION||0;
      const req=existingReq();
      if(curVer!==lastVer||JSON.stringify(req)!==JSON.stringify(myRequest)){
        lastVer=curVer;
        setMyRequest(req?{...req}:null);
        setTick(v=>v+1);
      }
    },1500);
    return()=>clearInterval(t);
  },[customerId]);

  const step = !myRequest ? 1 : myRequest.bridgeStatus==="bridged" ? 3 : 2;
  const [_localKey]=useState("btk-"+Math.random().toString(36).slice(2,18));
  const apiKey=myRequest?.apiKey||_localKey;

  const SAMPLE_FORMATS=[
    {label:"Bearer Token (most common)",badge:"Bearer",badgeColor:C.primary,
     hint:"Paste a cURL or JSON request that uses an Authorization header",
     sample:`curl -X POST https://api.yourcompany.com/orders \
  -H "Authorization: Bearer eyJhbGciOiJSUzI1..." \
  -H "Content-Type: application/json" \
  -d '{"order_id":"PO-2026-001","items":["APM-HTR-001"]}'`},
    {label:"API Key header",badge:"API Key",badgeColor:"#534AB7",
     hint:"Paste your API spec showing the x-api-key or similar header field",
     sample:`{
  "request_headers": {
    "x-api-key": "your-key-here",
    "x-tenant-id": "TENANT-001",
    "Content-Type": "application/json"
  },
  "endpoint": "https://api.yourcompany.com/v2/orders"
}`},
    {label:"OAuth 2.0 client credentials",badge:"OAuth 2.0",badgeColor:"#D85A30",
     hint:"Paste your OAuth config showing client_id, secret, and token URL",
     sample:`{
  "auth": {
    "type": "oauth2",
    "token_url": "https://auth.yourcompany.com/oauth2/token",
    "client_id": "your-client-id",
    "client_secret": "your-secret",
    "grant_type": "client_credentials",
    "scope": "orders:read orders:write"
  }
}`},
    {label:"Basic auth or API key in body",badge:"Basic / Body",badgeColor:"#BA7517",
     hint:"Paste a request showing username/password or api_key in the body",
     sample:`curl -X POST https://api.yourcompany.com/v1/orders \
  -u "username:password" \
  -H "Content-Type: application/json" \
  -d '{"api_key":"ak_live_xxx","order":{"id":"PO-001"}}'`},
  ];

  const AUTH_SIGNALS={
    "authorization: bearer":{type:"Bearer Token",color:C.primary,hdr:"Authorization",pfx:"Bearer"},
    "x-api-key":            {type:"API Key",color:"#534AB7",hdr:"x-api-key",pfx:""},
    "apikey":               {type:"API Key",color:"#534AB7",hdr:"x-api-key",pfx:""},
    "oauth2":               {type:"OAuth 2.0",color:"#D85A30",hdr:"Authorization",pfx:"Bearer"},
    "oauth/token":          {type:"OAuth 2.0",color:"#D85A30",hdr:"Authorization",pfx:"Bearer"},
    "client_credentials":   {type:"OAuth 2.0",color:"#D85A30",hdr:"Authorization",pfx:"Bearer"},
    "basic ":               {type:"Basic Auth",color:"#BA7517",hdr:"Authorization",pfx:"Basic"},
    "-u ":                  {type:"Basic Auth",color:"#BA7517",hdr:"Authorization",pfx:"Basic"},
    "api_key":              {type:"API Key (body)",color:"#3B6D11",hdr:"body",pfx:""},
  };

  function detectAuth(text){
    const lower=text.toLowerCase();
    for(const [sig,info] of Object.entries(AUTH_SIGNALS)){
      if(lower.includes(sig)) return info;
    }
    return null;
  }

  function handleSchemaChange(val){
    setSchema(val);
    setDetectedAuth(val.length>30?detectAuth(val):null);
  }

  function submitRequest(){
    if(!schema.trim()) return;
    const auth=detectAuth(schema)||{type:"Unknown",color:C.muted,hdr:"Authorization",pfx:""};
    const reqId="PR-"+Date.now().toString().slice(-6);
    const newReq={
      id:reqId,
      customerId,
      name:cust.name,
      type:cust.type,
      role,
      baseUrl:"https://api."+cust.name.toLowerCase().replace(/[^a-z]/g,"")+".com",
      auth:auth.type,
      authColor:auth.color,
      authHeader:auth.hdr,
      authPrefix:auth.pfx,
      schema,
      submittedAt:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}),
      status:"pending",
      bridgeStatus:"pending",
      fieldMappings:[],
    };
    if(!window.__PORTAL_REQUESTS) window.__PORTAL_REQUESTS=[];
    // Replace existing request for this customer if any
    const existIdx=window.__PORTAL_REQUESTS.findIndex(r=>r.customerId===customerId);
    if(existIdx>=0) window.__PORTAL_REQUESTS[existIdx]=newReq;
    else window.__PORTAL_REQUESTS.push(newReq);
    setMyRequest({...newReq});
  }

  // ── STEP 1: No request yet ──────────────────────────────
  if(step===1) return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{marginBottom:18}}>
        <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>API Service Setup</h2>
        <p style={{fontSize:12.5,color:C.muted}}>Connect your {isDealer?"store management system":"ERP or procurement system"} to BridgeTech Universal API</p>
      </div>

      {/* Progress bar */}
      <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:24}}>
        {[{n:1,l:"Submit your schema"},{n:2,l:"Admin bridges"},{n:3,l:"Go live"}].map((s,i)=>(
          <div key={s.n} style={{display:"flex",alignItems:"center",flex:i<2?1:"auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:"50%",
                background:s.n===1?C.primary:C.border,color:s.n===1?"#fff":C.muted,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{s.n}</div>
              <span style={{fontSize:12.5,fontWeight:s.n===1?700:400,color:s.n===1?C.navy:C.muted}}>{s.l}</span>
            </div>
            {i<2&&<div style={{flex:1,height:2,background:C.border,margin:"0 12px"}}/>}
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* LEFT: paste box */}
        <div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:6}}>Paste your API schema or sample request</div>
            <p style={{fontSize:12.5,color:C.muted,lineHeight:1.6,marginBottom:12}}>
              Paste any format — cURL, JSON config, OAuth snippet, or raw HTTP. The AI analyzer auto-detects your auth pattern and extracts all fields. Your schema is sent to the BridgeTech admin team who will configure the bridge and activate your service.
            </p>
            <textarea value={schema} onChange={e=>handleSchemaChange(e.target.value)} rows={10}
              style={{width:"100%",border:`1px solid ${detectedAuth?C.success:C.border}`,borderRadius:9,
                padding:"11px 14px",fontSize:12,fontFamily:"IBM Plex Mono",color:C.text,
                resize:"vertical",outline:"none",marginBottom:8,transition:"border-color .2s"}}
              placeholder="Paste here — cURL, JSON schema, OAuth config, or HTTP request sample"/>
            {detectedAuth&&(
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",
                background:`${detectedAuth.color}10`,borderRadius:8,border:`1px solid ${detectedAuth.color}30`,marginBottom:8}}>

// ── ORDER TRACKING (B2B Buyer / Dealer) ─────────────────────
function OrderTracking({customerId}){
  const [orderId,setOrderId]=useState("");
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const sampleOrders=[
    {id:"ORD-8821",status:"Shipped",oms:"SAP ERP",updated:"2h ago",items:"50× Heating Element",eta:"Mar 28"},
    {id:"ORD-8819",status:"Processing",oms:"MS Dynamics",updated:"4h ago",items:"30× Drain Pump",eta:"Mar 29"},
    {id:"ORD-8817",status:"Confirmed",oms:"WMS",updated:"1d ago",items:"200× Temperature Sensor",eta:"Mar 27"},
  ];
  async function track(){
    if(!orderId.trim())return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,1200));
    const found=sampleOrders.find(o=>o.id===orderId.toUpperCase())||{
      id:orderId.toUpperCase(),status:"In Transit",oms:"SAP ERP",updated:"1h ago",items:"Various parts",eta:"Mar 30"};
    setResult(found);setLoading(false);
  }
  const stColor={"Shipped":C.success,"Processing":C.accent,"Confirmed":C.blue,"In Transit":C.warn};
  return(
    <div style={{padding:"22px 26px",overflowY:"auto",flex:1,background:C.bg}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:19,fontWeight:800,color:C.navy,marginBottom:2}}>Order Tracking</h2>
        <p style={{fontSize:12.5,color:C.muted}}>Real-time status from OMS systems · GET /api/track/{"{id}"}</p>
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:12}}>Track an order</div>
        <div style={{display:"flex",gap:10}}>
          <input value={orderId} onChange={e=>setOrderId(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&track()}
            placeholder="Enter Order ID (e.g. ORD-8821)"
            style={{flex:1,border:`1px solid ${C.border}`,borderRadius:9,padding:"10px 14px",fontSize:13,fontFamily:"IBM Plex Mono",outline:"none"}}/>
          <button onClick={track} disabled={loading||!orderId.trim()}
            style={{padding:"10px 22px",borderRadius:9,border:"none",background:loading?C.muted:C.primary,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {loading?"Tracking...":"Track →"}
          </button>
        </div>
        {result&&(
          <div className="fadeUp" style={{marginTop:16,padding:"16px 18px",background:C.bg,borderRadius:10,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:C.navy,marginBottom:2}}>{result.id}</div>
                <div style={{fontSize:12,color:C.muted}}>{result.items}</div>
              </div>
              <span style={{padding:"4px 12px",borderRadius:12,background:`${stColor[result.status]||C.muted}18`,
                color:stColor[result.status]||C.muted,fontSize:12.5,fontWeight:700}}>{result.status}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[["OMS System",result.oms],["Last Updated",result.updated],["Estimated Arrival",result.eta]].map(([k,v])=>(
                <div key={k} style={{padding:"9px 12px",background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10.5,color:C.muted,marginBottom:3}}>{k}</div>
                  <div style={{fontSize:12.5,fontWeight:600,color:C.navy}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700,color:C.navy}}>Recent Orders</div>
        {sampleOrders.map((o,i)=>(
          <div key={i} onClick={()=>{setOrderId(o.id);setResult(o);}}
            style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"13px 18px",borderBottom:i<2?`1px solid ${C.bg}`:"none",cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.background=C.bg}
            onMouseLeave={e=>e.currentTarget.style.background=""}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:C.primary,fontFamily:"IBM Plex Mono",marginBottom:2}}>{o.id}</div>
              <div style={{fontSize:11.5,color:C.muted}}>{o.items} · {o.oms}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <span style={{padding:"3px 10px",borderRadius:10,background:`${stColor[o.status]||C.muted}18`,
                color:stColor[o.status]||C.muted,fontSize:11.5,fontWeight:600}}>{o.status}</span>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>ETA: {o.eta}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── AI SUPPORT AGENT ───────────────────────────────────────
function SupportAgent(){
  const [issues,setIssues]=useState([
    {id:"ISS-001",portal:"Eastern Tech Distributor",type:"High Error Rate",severity:"high",desc:"HTTP 422 errors spiking — 312 errors in last 24h, 5.5% error rate",status:"open",resolution:null},
    {id:"ISS-002",portal:"SAP Ariba Integration",type:"Latency Spike",severity:"medium",desc:"Avg latency jumped from 210ms to 890ms — possible payload size issue",status:"open",resolution:null},
    {id:"ISS-003",portal:"Meridian Foods Corp",type:"Auth Token Expiry",severity:"low",desc:"API key rotation due in 3 days — automated renewal not configured",status:"open",resolution:null},
  ]);
  const [loading,setLoading]=useState({});
  const [chatMsgs,setChatMsgs]=useState([
    {role:"assistant",content:"Hi! I'm the BridgeTech Support Agent. I can help diagnose portal issues, suggest fixes, and guide resolutions. What can I help you with?"}
  ]);
  const [chatInput,setChatInput]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const chatRef=useRef();
  const sys=`You are an expert API orchestration support agent for BridgeTech's Universal API Orchestrator Platform. 
You help diagnose and resolve issues with portal integrations, API errors, latency spikes, authentication failures, and more.
Known portals: SAP Ariba (Vendor), Amazon B2B (Dealer), Meridian Foods Corp (B2B Buyer, at BridgeTech Orchestration Hub), Eastern Tech Distributor (warning status), Sunbelt Supply (inactive).

FORMATTING RULES (always follow):
- Structure resolution plans as: ## Root Cause, ## Immediate Fix, ## Prevention
- Use numbered lists for sequential steps
- Use **bold** for commands, config keys, and critical values
- Use \`code\` formatting for API paths, config values, and commands
- Use markdown tables when comparing portal stats, error rates, or metrics
- Keep responses clear and professional`;

  async function resolve(issue){
    setLoading(l=>({...l,[issue.id]:true}));
    const prompt=`Issue: ${issue.type} on ${issue.portal}. Severity: ${issue.severity}. Details: ${issue.desc}. Provide a 3-step resolution plan with: 1) Root cause analysis, 2) Immediate fix, 3) Prevention measures. Be concise.`;
    try{
      const res=await callClaude([{role:"user",content:prompt}],sys,500);
      setIssues(is=>is.map(i=>i.id===issue.id?{...i,resolution:res,status:"resolved"}:i));
    }finally{setLoading(l=>({...l,[issue.id]:false}));}
  }
  async function sendChat(){
    if(!chatInput.trim()||chatLoading)return;
    const um={role:"user",content:chatInput};
    const newMsgs=[...chatMsgs,um];
    setChatMsgs(newMsgs);setChatInput("");setChatLoading(true);
    try{
      const res=await callClaude(newMsgs.map(m=>({role:m.role,content:m.content})),sys,600);
      setChatMsgs([...newMsgs,{role:"assistant",content:res}]);
    }finally{setChatLoading(false);}
  }
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[chatMsgs]);
  const sevColor={high:C.danger,medium:C.warn,low:C.success};
  return(
    <div style={{padding:28,flex:1,overflowY:"auto",display:"flex",gap:20}}>
      <div style={{flex:1,minWidth:0}}>
        <SectionTitle icon="🛡️" title="AI Support Agent" sub="Automated issue detection and AI-powered resolution"/>
        {issues.map(issue=>(
          <Card key={issue.id} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}>
                  <Badge color={sevColor[issue.severity]}>{issue.severity.toUpperCase()}</Badge>
                  <span style={{fontWeight:700,color:C.navy,fontSize:14}}>{issue.type}</span>
                  {issue.status==="resolved"&&<Badge color={C.success}>✓ Resolved</Badge>}
                </div>
                <div style={{fontSize:13,color:C.primary,fontWeight:500}}>{issue.portal}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>{issue.desc}</div>
              </div>
              <Btn variant={issue.status==="resolved"?"ghost":"primary"} small onClick={()=>resolve(issue)} disabled={loading[issue.id]||issue.status==="resolved"}>
                {loading[issue.id]?<><Spinner/> Resolving...</>:issue.status==="resolved"?"✓ Done":"Get AI Resolution"}
              </Btn>
            </div>
            {issue.resolution&&(
              <div className="fadeUp" style={{padding:"16px 18px",background:C.success+"0A",borderRadius:12,border:`1px solid ${C.success}30`,marginTop:10}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                  <span style={{background:C.success,color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>✓ AI RESOLUTION PLAN</span>
                </div>
                <RichMessage text={issue.resolution} isUser={false}/>
              </div>
            )}
          </Card>
        ))}
      </div>
      <div style={{width:320,display:"flex",flexDirection:"column"}}>
        <Card style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:0}}>
          <div style={{padding:"16px 18px",borderBottom:`1px solid ${C.border}`,background:C.primaryDim}}>
            <div style={{fontWeight:700,color:C.navy,fontSize:14}}>🛡️ AI Support Chat</div>
            <div style={{fontSize:11,color:C.muted}}>Ask anything about your integration</div>
          </div>
          <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12,minHeight:0}}>
            {chatMsgs.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:8,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&<div style={{width:28,height:28,background:C.primaryDim,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🛡️</div>}
                <div style={{maxWidth:"86%",background:m.role==="user"?C.primary:C.surface,
                  border:m.role==="assistant"?`1px solid ${C.border}`:"none",
                  borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",
                  padding:"10px 13px",color:m.role==="user"?"#fff":C.text,
                  boxShadow:m.role==="assistant"?"0 1px 4px rgba(0,0,0,0.05)":"none"}}>
                  <RichMessage text={m.content} isUser={m.role==="user"}/>
                </div>
              </div>
            ))}
            {chatLoading&&<div style={{display:"flex",gap:8}}>
              <div style={{width:28,height:28,background:C.primaryDim,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🛡️</div>
              <div style={{background:C.bg,borderRadius:"12px 12px 12px 4px",padding:"12px 16px",display:"flex",gap:4}}>
                {[0,1,2].map(j=><div key={j} style={{width:6,height:6,borderRadius:"50%",background:C.muted,animation:`pulse 1.2s ease-in-out ${j*.2}s infinite`}}/>)}
              </div>
            </div>}
          </div>
          <div style={{padding:"10px 14px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}
              placeholder="Ask about portal issues..." style={{flex:1,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12.5,outline:"none"}}/>
            <Btn small onClick={sendChat} disabled={chatLoading}>↑</Btn>
          </div>
        </Card>
      </div>
    </div>
  );
}

function JsonTree({data, depth=0, highlight=null}){
  if(typeof data !== "object" || data === null){
    const isStr = typeof data === "string";
    return <span style={{color: isStr ? "#22C55E" : "#F59E0B", fontFamily:"IBM Plex Mono", fontSize:11}}>{isStr ? `"${data}"` : String(data)}</span>;
  }
  const isArr = Array.isArray(data);
  const keys = Object.keys(data);
  return(
    <span>
      <span style={{color:"#94A3B8"}}>{isArr?"[":"{"}</span>
      <div style={{paddingLeft:14}}>
        {keys.map((k,i)=>{
          const isHL = highlight && highlight.includes(k);
          return(
            <div key={k} style={{
              display:"flex", gap:4, alignItems:"flex-start",
              background: isHL ? "rgba(245,158,11,0.15)" : "transparent",
              borderLeft: isHL ? "2px solid #F59E0B" : "2px solid transparent",
              paddingLeft: isHL ? 4 : 4,
              borderRadius: 3, marginBottom:1
            }}>
              <span style={{color: isHL ? "#F59E0B" : "#7DD3FC", fontFamily:"IBM Plex Mono", fontSize:11, flexShrink:0}}>
                {isArr ? "" : `"${k}": `}
              </span>
              <JsonTree data={data[k]} depth={depth+1} highlight={highlight}/>
              {i < keys.length-1 && <span style={{color:"#94A3B8"}}>,</span>}
            </div>
          );
        })}
      </div>
      <span style={{color:"#94A3B8"}}>{isArr?"]":"}"}</span>
    </span>
  );
}

function SchemaBridge(){
  const [requests, setRequests]   = useState(()=>window.__PORTAL_REQUESTS||[]);
  const [selected, setSelected]   = useState(null);
  const [phase, setPhase]         = useState("idle");
  const [liveLog, setLiveLog]     = useState([]);
  const [mappings, setMappings]   = useState([]);
  const [aiRec, setAiRec]         = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [applyStep, setApplyStep] = useState(-1);
  const [appliedMap, setAppliedMap] = useState([]);
  const [verifyResult, setVerifyResult] = useState(null);
  const logRef = useRef();

  // Refresh from global store every time we select
  function refreshRequests(){ setRequests([...(window.__PORTAL_REQUESTS||[])]); }
  // Poll for new live submissions every 3 seconds
  useEffect(()=>{
    const t=setInterval(()=>{
      const fresh=window.__PORTAL_REQUESTS||[];
      setRequests(prev=>{
        if(JSON.stringify(prev.map(r=>r.id+r.bridgeStatus))!==JSON.stringify(fresh.map(r=>r.id+r.bridgeStatus)))
          return [...fresh];
        return prev;
      });
    },3000);
    return()=>clearInterval(t);
  },[]);

  // ── Derive field mappings from submitted schema ─────────────
  function deriveMappings(schema){
    let parsed = {};
    try{ parsed = JSON.parse(schema); }catch{ return []; }
    const flat = flattenKeys(parsed,"");
    const BT_FIELDS = {
      "id":"id",          "order_id":"id",        "po_id":"id",        "order_ref":"id",     "OrderID":"id","purchase_order.po_id":"id",
      "portal_id":"portal_id","vendor_id":"portal_id","dealer_code":"portal_id","customerCode":"portal_id","vendor_order.vendor_id":"portal_id",
      "created_at":"created_at","placed_on":"created_at","order_date":"created_at","Timestamp":"created_at","date_placed":"created_at",
      "currency":"currency","currency_code":"currency","CurrencyISO":"currency","curr":"currency",
      "total_amount":"total_amount","order_total":"total_amount","TotalValue":"total_amount","amount_total":"total_amount","total":"total_amount",
      "status":"status","state":"status","OrderState":"status","po_status":"status","order_status":"status","fulfillmentStatus":"status",
      "line_items[].sku":"line_items[].sku","products[].prod_id":"line_items[].sku","Items[].SKUCode":"line_items[].sku","line_items[].part_number":"line_items[].sku","line_num[].part_number":"line_items[].sku",
      "line_items[].quantity":"line_items[].quantity","products[].qty":"line_items[].quantity","Items[].Units":"line_items[].quantity","line_items[].ordered_qty":"line_items[].quantity",
      "line_items[].unit_price":"line_items[].unit_price","products[].unit_price":"line_items[].unit_price","Items[].PriceEach":"line_items[].unit_price","line_items[].line_price":"line_items[].unit_price",
      "shipping.city":"shipping.city","ship_to.city":"shipping.city","DeliveryAddress.City":"shipping.city","delivery.city_name":"shipping.city",
      "shipping.postal_code":"shipping.postal_code","ship_to.postal":"shipping.postal_code","DeliveryAddress.ZipCode":"shipping.postal_code","delivery.post_code":"shipping.postal_code",
      "shipping.country_code":"shipping.country_code","ship_to.nation":"shipping.country_code","DeliveryAddress.CountryCode":"shipping.country_code","delivery.country_iso":"shipping.country_code",
    };
    const maps=[];
    flat.forEach(key=>{
      const btField = BT_FIELDS[key];
      if(btField){
        const vKey=key.split(".").pop()||key;
        const btKey=btField.split(".").pop()||btField;
        const sameKey=vKey===btKey||vKey.toLowerCase()===btKey.toLowerCase();
        const isDate=btField==="created_at";
        const isCountry=btField==="shipping.country_code"&&!key.includes("ISO");
        const isEnum=btField==="status";
        let type="rename", color=C.blue, label="rename";
        if(sameKey){type="passthrough";color=C.success;label="✓ match";}
        else if(isDate){type="transform";color=C.warn;label="date format";}
        else if(isCountry){type="transform";color=C.danger;label="ISO convert";}
        else if(isEnum){type="transform";color=C.accent;label="enum map";}
        maps.push({from:key, to:btField, type, color, label,
          issue:type==="passthrough"?null:`${type==="rename"?"Field rename":"Transform"}: ${key} → ${btField}`});
      }
    });
    return maps.length?maps:[
      {from:"order_id",to:"id",type:"rename",color:C.blue,label:"rename",issue:"Field rename required"},
      {from:"vendor_code",to:"portal_id",type:"rename",color:C.blue,label:"rename",issue:"Field rename required"},
      {from:"order_date",to:"created_at",type:"transform",color:C.warn,label:"date format",issue:"Date format conversion required"},
      {from:"amount",to:"total_amount",type:"rename",color:C.blue,label:"rename",issue:"Field rename required"},
      {from:"state",to:"status",type:"transform",color:C.accent,label:"enum map",issue:"Enum mapping required"},
    ];
  }

  function flattenKeys(obj, prefix){
    const keys=[];
    if(typeof obj!=="object"||!obj) return keys;
    Object.entries(obj).forEach(([k,v])=>{
      const full=prefix?`${prefix}.${k}`:k;
      if(Array.isArray(v)&&v.length&&typeof v[0]==="object"){
        Object.keys(v[0]).forEach(ak=>keys.push(`${full}[].${ak}`));
      } else if(typeof v==="object"&&!Array.isArray(v)){
        keys.push(...flattenKeys(v,full));
      } else { keys.push(full); }
    });
    return keys;
  }

  // ── PHASE 1: Scan & Analyze ─────────────────────────────────
  async function runAnalysis(){
    if(!selected){alert("Please select a portal request first");return;}
    setPhase("scanning");setLiveLog([]);setMappings([]);
    setAiRec("");setApplyStep(-1);setAppliedMap([]);setVerifyResult(null);

    const maps = deriveMappings(selected.schema||"{}");
    const issues = maps.filter(m=>m.issue);
    const logItems=[

      {icon:"📋",msg:`Auth method: ${selected.auth} · Submitted: ${selected.submittedAt}`,color:C.muted},
      {icon:"🧬",msg:`Schema loaded — ${maps.length} fields identified`,color:C.accent},

      {icon:"🧠",msg:"AI Agent generating bridge recommendation...",color:C.primary},
    ];

    for(let i=0;i<logItems.length;i++){
      await new Promise(r=>setTimeout(r,500));
      setLiveLog(l=>[...l,logItems[i]]);
      if(i===3)setPhase("analyzing");
      if(i===5)setPhase("recommending");
      if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;
    }

    // Reveal mappings
    setPhase("mapping");
    for(let i=0;i<maps.length;i++){
      await new Promise(r=>setTimeout(r,150));
      setMappings(m=>[...m,maps[i]]);
    }

    // AI recommendation
    setAiLoading(true);
    const sys=`You are an AI API Integration Specialist for BridgeTech Orchestration Platform.
A ${selected.type} portal has submitted a connection request. Analyze the schema and provide bridge recommendations.
Always use markdown with: ## Issues Found, ## Bridge Strategy, ## Transformation Rules (as a numbered list), ## Risk Assessment.
Be concise and actionable.`;
    const prompt=`Portal: ${selected.name} (${selected.type})
Endpoint: ${selected.baseUrl}${selected.inbound}
Auth: ${selected.auth}
Schema: ${selected.schema||"Not provided"}

Detected issues:
${issues.map((m,i)=>`${i+1}. ${m.issue}`).join("\n")||"None — direct mapping possible"}

Field mappings required:
${maps.map(m=>`- ${m.from} → ${m.to} (${m.label})`).join("\n")}

Provide bridge recommendation. End with a clear statement on whether this portal can be bridged automatically.`;

    const rec=await callClaude([{role:"user",content:prompt}],sys,900);
    setAiRec(rec);
    setAiLoading(false);
    setPhase("recommended");
    setMappings(maps);
  }

  // ── PHASE 2: Apply AI Changes ───────────────────────────────
  async function applyChanges(){
    setPhase("applying");
    setApplyStep(0);
    setAppliedMap([]);

    const applyLog=[
      {icon:"⚙️",msg:"Initialising transformation engine...",color:C.primary},
      {icon:"🔑",msg:"Applying field rename rules...",color:C.blue},
      {icon:"📅",msg:"Applying date format transformers...",color:C.warn},
      {icon:"🔄",msg:"Applying enum value mappings...",color:C.accent},
      {icon:"🌍",msg:"Applying country code converters...",color:C.danger},
      {icon:"🔗",msg:"Compiling bridge middleware layer...",color:C.primary},
      {icon:"✅",msg:"Transformation rules compiled successfully",color:C.success},
    ];

    for(let i=0;i<applyLog.length;i++){
      await new Promise(r=>setTimeout(r,600));
      setLiveLog(l=>[...l,applyLog[i]]);
      setApplyStep(i);
      if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;
    }

    // Mark each mapping applied
    for(let i=0;i<mappings.length;i++){
      await new Promise(r=>setTimeout(r,120));
      setAppliedMap(a=>[...a,i]);
    }

    // Phase 3: Re-verify
    setPhase("verifying");
    const verifyLog=[
      {icon:"🔍",msg:"Re-verifying schema against BridgeTech target...",color:C.blue},
      {icon:"📊",msg:"Checking field completeness...",color:C.primary},
      {icon:"🧪",msg:"Running test payload through bridge...",color:C.accent},
      {icon:"✅",msg:"All fields mapped — verification passed!",color:C.success},
    ];
    for(let i=0;i<verifyLog.length;i++){
      await new Promise(r=>setTimeout(r,550));
      setLiveLog(l=>[...l,verifyLog[i]]);
      if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;
    }

    await new Promise(r=>setTimeout(r,400));
    const passCount=mappings.filter(m=>m.type==="passthrough").length;
    const totalCount=mappings.length;
    setVerifyResult({
      pass:true,
      matched:totalCount,
      direct:passCount,
      transformed:mappings.filter(m=>m.type==="transform").length,
      renamed:mappings.filter(m=>m.type==="rename").length,

    // Mark portal as bridged in global store
    if(window.__PORTAL_REQUESTS){
      const idx=window.__PORTAL_REQUESTS.findIndex(r=>r.id===selected.id);

        window.__PORTAL_REQUESTS[idx]={...window.__PORTAL_REQUESTS[idx],
          status:"active",bridgeStatus:"bridged",
          bridgedAt:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}),
          apiKey:"btk-"+Math.random().toString(36).slice(2,18),

      }

    setRequests([...(window.__PORTAL_REQUESTS||[])]);
    setSelected(s=>({...s,status:"active",bridgeStatus:"bridged"}));
    setPhase("complete");

  const phaseColor={idle:C.muted,scanning:C.blue,analyzing:C.warn,mapping:C.accent,

  const pending=requests.filter(r=>r.bridgeStatus==="pending"||!r.bridgeStatus);

  const typeColor={"B2B Buyer":C.accent,"B2P Portal":"#D85A30",Dealer:C.success,Vendor:C.blue};

  return(
    <div style={{padding:"20px 24px",overflowY:"auto",flex:1,background:C.bg,display:"flex",flexDirection:"column",gap:14}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
